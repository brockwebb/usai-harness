name: CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -v --tb=short --ignore=tests/integration

  audit:
    name: pip-audit (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install hard dependencies only
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        id: audit_run
        continue-on-error: true
        run: pip-audit --progress-spinner=off | tee pip-audit.out

      - name: Surface audit findings to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## pip-audit findings"
            echo
            if [ -s pip-audit.out ]; then
              echo '```'
              cat pip-audit.out
              echo '```'
            else
              echo "No output captured."
            fi
            if [ "${{ steps.audit_run.outcome }}" = "failure" ]; then
              echo
              echo "_pip-audit reported advisories. The job is allowed to fail soft; the maintainer triages._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  lockfile_install:
    name: Lockfile install (--require-hashes)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install from requirements.lock with hash verification
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Install harness without extras
        run: pip install -e . --no-deps

      - name: Verify import works
        run: python -c "from usai_harness import USAiClient; print('USAiClient OK')"

      - name: Run a subset of unit tests that do not need optional extras
        run: |
          pip install pytest pytest-asyncio
          pytest tests/test_config.py tests/test_logger.py tests/test_redaction.py -v
