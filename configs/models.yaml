# USAi catalog: identity and accounting only.
# Per ADR-009, the live /api/v1/models response is authoritative for which
# models exist. This file seeds providers and accounting fields (cost rates,
# context window) that the live response does not carry. Per the ADR-012
# amendment (2026-04-29), entries do NOT carry parameter limits like
# `temperature_range` or `max_output_tokens`; the harness is a pass-through
# and the provider's response is the source of truth at call time.

# Maximum characters of a non-2xx response body that the transport captures,
# redacts, and writes to the call log under `error_body`. Range: 1..2000.
# Validated by config.py at load time.
error_body_snippet_max_chars: 200

providers:
  usai:
    base_url: https://your-agency-endpoint.usai.gov/api/v1
    api_key_env: USAI_API_KEY

models:
  "meta-llama/Llama-4-Maverick-17B-128E-Instruct":
    provider: usai
    context_window: 131072
    supports_temperature: true
    supports_system_prompt: true
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

