# Known USAi models and their constraints
# Update as models are added/removed from USAi

models:
  llama-4-maverick:
    provider: meta
    context_window: 131072
    max_output_tokens: 32768
    supports_temperature: true
    temperature_range: [0.0, 2.0]
    supports_system_prompt: true
    cost_per_1k_input_tokens: 0.0    # free credits — update when billing activates
    cost_per_1k_output_tokens: 0.0

  claude-opus-4-5:
    provider: anthropic
    context_window: 200000
    max_output_tokens: 32000
    supports_temperature: true
    temperature_range: [0.0, 1.0]
    supports_system_prompt: true
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

  gemini-2-5-pro:
    provider: google
    context_window: 1048576
    max_output_tokens: 65536
    supports_temperature: true
    temperature_range: [0.0, 2.0]
    supports_system_prompt: true
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

# Default model for new projects
default_model: llama-4-maverick
