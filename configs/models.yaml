# USAi model presentation overrides.
# Per ADR-009, the live /api/v1/models response is authoritative for which
# models exist. This file provides display names, temperature ranges, and
# cost rates for known IDs. Entries matching the live catalog are merged;
# IDs not present in the live catalog are ignored.

providers:
  usai:
    base_url: https://your-agency-endpoint.usai.gov/api/v1
    api_key_env: USAI_API_KEY

models:
  "meta-llama/Llama-4-Maverick-17B-128E-Instruct":
    provider: usai
    context_window: 131072
    max_output_tokens: 32768
    supports_temperature: true
    temperature_range: [0.0, 2.0]
    supports_system_prompt: true
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

  "meta-llama/Llama-3.2-11B-Vision-Instruct":
    provider: usai
    context_window: 128000
    max_output_tokens: 4096
    supports_temperature: true
    temperature_range: [0.0, 1.0]
    supports_system_prompt: true
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

  "claude-opus-4-5-20250521":
    provider: usai
    context_window: 200000
    max_output_tokens: 32000
    supports_temperature: true
    temperature_range: [0.0, 1.0]
    supports_system_prompt: true
