# Family catalog v1.
#
# Keyed on vendor + product line + major version. Within a major version,
# dated SKUs share parameter behavior; the alias table at the bottom maps
# provider-specific identifiers to family keys.
#
# Citation tiers:
#   t1 - vendor primary doc (model card, official API reference)
#   t2 - cloud provider doc (AWS Bedrock, Azure OpenAI, Vertex)
#   t3 - third-party aggregator or community guide
#   t4 - empirical (verified against the live endpoint by harness maintainers)
#
# Fields marked "needs_verification" should be checked empirically before
# being cited in research. The harness will warn if a config relies on a
# field marked needs_verification.

metadata:
  catalog_version: "0.1"
  compiled_at: "2026-04-29"
  methodology: |
    Compiled from public vendor documentation supplemented by cloud
    provider docs and a 2026-04-29 deep-research pass. Each parameter
    field carries a tier label per the legend above.

families:

  claude-sonnet-4:
    vendor: anthropic
    description: "Anthropic Claude Sonnet, 4.x major line"
    accepts_temperature:
      value: false
      tier: t2
      source: "AWS Bedrock Claude 4.5 Sonnet parameter docs note temperature/top_p mutual exclusion; direct Anthropic API rejects temperature on this line per community reports. Verify via `usai-harness verify-model` if precision matters."
    accepts_top_p:
      value: true
      range: [0.0, 1.0]
      tier: t2
      source: "AWS Bedrock parameter documentation."
    accepts_top_k:
      value: needs_verification
      tier: t3
    accepts_frequency_penalty:
      value: false
      tier: t3
      source: "Anthropic API does not document frequency_penalty for Claude family."
    accepts_presence_penalty:
      value: false
      tier: t3
    max_output_tokens:
      value: 8192
      tier: t2
    context_window_tokens:
      value: 200000
      tier: t1
      source: "https://docs.anthropic.com/en/docs/about-claude/models"

  claude-opus-4:
    vendor: anthropic
    description: "Anthropic Claude Opus, 4.x major line"
    accepts_temperature:
      value: false
      tier: t3
      source: "Inferred from Claude 4.x family behavior; verify empirically for opus specifically."
    accepts_top_p:
      value: true
      range: [0.0, 1.0]
      tier: t3
    accepts_top_k:
      value: needs_verification
      tier: t3
    accepts_frequency_penalty:
      value: false
      tier: t3
    accepts_presence_penalty:
      value: false
      tier: t3
    max_output_tokens:
      value: 8192
      tier: t3
    context_window_tokens:
      value: 200000
      tier: t1

  claude-haiku-4:
